apiVersion: v1
kind: Service
metadata:
  name: nacos
  namespace: nacos
  labels:
    app: nacos
spec:
  type: NodePort
  selector:
    app: nacos
  ports:
    - name: server
      port: 8848
      targetPort: 8848
      protocol: TCP
    - name: client-rpc
      port: 9848
      targetPort: 9848
      protocol: TCP
    - name: console
      port: 8080
      targetPort: 8080
      protocol: TCP
