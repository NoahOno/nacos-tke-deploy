apiVersion: apps/v1
kind: Deployment
metadata:
  name: nacos
  namespace: nacos
  labels:
    app: nacos
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: nacos
  template:
    metadata:
      labels:
        app: nacos
    spec:
      imagePullSecrets:
        - name: tcr.ipstcr-aipxjlcl-public
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: purpose
                    operator: In
                    values:
                      - zdhcs-devolp
      tolerations:
        - key: "purpose"
          operator: "Equal"
          value: "zdhcs-devolp"
          effect: "NoSchedule"
      containers:
        - name: nacos
          image: tkeprod.tencentcloudcr.com/cyouops/nacos-server:v3.2.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8848
              name: server
              protocol: TCP
            - containerPort: 9848
              name: client-rpc
              protocol: TCP
            - containerPort: 8080
              name: console
              protocol: TCP
          env:
            # --- 基础配置 ---
            - name: MODE
              valueFrom:
                configMapKeyRef:
                  name: nacos-config
                  key: MODE
            # --- AI Registry ---
            - name: NACOS_AI_REGISTRY_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: nacos-config
                  key: NACOS_AI_REGISTRY_ENABLED
            - name: NACOS_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: nacos-auth
                  key: auth-token
            - name: NACOS_AUTH_IDENTITY_KEY
              value: "nacos-id-8c85b5d2"
            - name: NACOS_AUTH_IDENTITY_VALUE
              value: "sriDC11dZHaXgrhwdV2Pa2sGcpBs9+sV"
            - name: NACOS_USERNAME
              valueFrom:
                secretKeyRef:
                  name: nacos-auth
                  key: username
            - name: NACOS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nacos-auth
                  key: password
            # --- JVM ---
            - name: JVM_XMS
              value: "1g"
            - name: JVM_XMX
              value: "1g"
            - name: JVM_XMN
              value: "512m"
          readinessProbe:
            httpGet:
              path: /v3/console/health/readiness
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /v3/console/health/readiness
              port: 8080
            initialDelaySeconds: 180
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              cpu: "2"
              memory: 4Gi
